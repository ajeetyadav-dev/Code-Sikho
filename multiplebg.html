<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Background</title>
    <style>
        .box{
            height:100vh;
            background-image: url(images.jpg) ,url(pexels-photo-247431.jpeg);

            font-size: 30px;
            color: #fff;

    <div class="box">
Multiple Image Background
    </div>

</html>
