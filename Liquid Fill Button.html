<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Fill Button</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .liquid-btn {
            position: relative;
            padding: 25px 50px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: transparent;
            border: 3px solid white;
            border-radius: 50px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .liquid-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .liquid-fill {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            transition: left 0.6s ease;
            z-index: -1;
        }

        .liquid-btn:hover .liquid-fill {
            left: 0;
        }

        .liquid-wave {
            position: absolute;
            top: -5px;
            left: -100%;
            width: 200%;
            height: 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transition: left 0.6s ease;
            animation: wave 2s linear infinite;
        }

        @keyframes wave {
            0% {
                transform: translateX(0) translateY(0);
            }
            50% {
                transform: translateX(25%) translateY(-3px);
            }
            100% {
                transform: translateX(50%) translateY(0);
            }
        }

        .liquid-btn:hover .liquid-wave {
            left: 0;
        }

        .btn-text {
            position: relative;
            z-index: 1;
            transition: color 0.3s ease;
        }

        .liquid-btn:hover .btn-text {
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            margin: 5px;
            border-radius: 20px;
            cursor: pointer;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <button class="liquid-btn" id="liquidBtn">
        <span class="liquid-fill"></span>
        <span class="liquid-wave"></span>
        <span class="btn-text">Liquid Fill</span>
    </button>

    <div class="controls">
        <button class="control-btn" onclick="changeColor()">Change Color</button>
        <button class="control-btn" onclick="toggleWave()">Toggle Wave</button>
    </div>

    <script>
        const colors = [
            ['#ff6b6b', '#4ecdc4'],
            ['#f093fb', '#f5576c'],
            ['#4facfe', '#00f2fe'],
            ['#43e97b', '#38f9d7'],
            ['#fa709a', '#fee140']
        ];
        
        let currentColorIndex = 0;
        let waveEnabled = true;

        function changeColor() {
            currentColorIndex = (currentColorIndex + 1) % colors.length;
            const fill = document.querySelector('.liquid-fill');
            fill.style.background = `linear-gradient(90deg, ${colors[currentColorIndex][0]}, ${colors[currentColorIndex][1]})`;
        }

        function toggleWave() {
            const wave = document.querySelector('.liquid-wave');
            waveEnabled = !waveEnabled;
            wave.style.display = waveEnabled ? 'block' : 'none';
        }

        // Add ripple effect on click
        document.getElementById('liquidBtn').addEventListener('click', function(e) {
            const rect = this.getBoundingClientRect();
            const ripple = document.createElement('span');
            const size = Math.max(rect.width, rect.height);
            const x = e.clientX - rect.left - size / 2;
            const y = e.clientY - rect.top - size / 2;
            
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.classList.add('ripple');
            
            this.appendChild(ripple);
            
            setTimeout(() => ripple.remove(), 600);
        });
    </script>
</body>
</html>
