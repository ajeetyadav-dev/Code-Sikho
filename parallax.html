<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax Effect</title>
    <style>
        .parallax{
            background-image:url(pexels-photo-247431.jpeg);
            height:100vh;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }
        .content{
            height:500px;
            background:white;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:30px;
        }
    </style>
</head>
<body>
    <div class="parallax">
        <div class="content">
            Scroll Karke Parallax Effect Dekho
        </div>
    </div>
</body>
</html>
