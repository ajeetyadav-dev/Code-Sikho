<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch Text Effect</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glitch-container {
            position: relative;
            text-align: center;
        }

        .glitch {
            position: relative;
            font-size: 80px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 5px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch::before {
            animation: glitch-1 0.5s infinite;
            color: #00ffff;
            z-index: -1;
        }

        .glitch::after {
            animation: glitch-2 0.5s infinite;
            color: #ff00ff;
            z-index: -2;
        }

        @keyframes glitch-1 {
            0%, 100% {
                clip-path: inset(0 0 0 0);
                transform: translate(0);
            }
            20% {
                clip-path: inset(20% 0 30% 0);
                transform: translate(-2px, 2px);
            }
            40% {
                clip-path: inset(50% 0 20% 0);
                transform: translate(2px, -2px);
            }
            60% {
                clip-path: inset(10% 0 60% 0);
                transform: translate(-2px, 1px);
            }
            80% {
                clip-path: inset(80% 0 5% 0);
                transform: translate(1px, -1px);
            }
        }

        @keyframes glitch-2 {
            0%, 100% {
                clip-path: inset(0 0 0 0);
                transform: translate(0);
            }
            20% {
                clip-path: inset(60% 0 10% 0);
                transform: translate(2px, -1px);
            }
            40% {
                clip-path: inset(20% 0 50% 0);
                transform: translate(-2px, 2px);
            }
            60% {
                clip-path: inset(30% 0 40% 0);
                transform: translate(1px, -2px);
            }
            80% {
                clip-path: inset(5% 0 80% 0);
                transform: translate(-1px, 1px);
            }
        }

        .glitch:hover {
            animation: glitch-hover 0.3s infinite;
        }

        @keyframes glitch-hover {
            0%, 100% {
                transform: translate(0);
                filter: hue-rotate(0deg);
            }
            25% {
                transform: translate(-2px, 2px);
                filter: hue-rotate(90deg);
            }
            50% {
                transform: translate(2px, -2px);
                filter: hue-rotate(180deg);
            }
            75% {
                transform: translate(-2px, -2px);
                filter: hue-rotate(270deg);
            }
        }

        .subtitle {
            color: #666;
            font-size: 18px;
            margin-top: 20px;
            opacity: 0.8;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            margin: 5px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                transparent 50%,
                rgba(0, 255, 255, 0.03) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    
    <div class="glitch-container">
        <div class="glitch" data-text="GLITCH">Code Sikho</div>
        <div class="subtitle">Click to intensify effect</div>
    </div>

    <div class="controls">
        <button class="control-btn" onclick="changeText()">Change Text</button>
        <button class="control-btn" onclick="toggleIntensity()">Intensity</button>
        <button class="control-btn" onclick="randomGlitch()">Random</button>
    </div>

    <script>
        const texts = ['Code', 'Sikho', 'With', 'AJ', 'Subscribe'];
        let currentTextIndex = 0;
        let intensity = 1;

        function changeText() {
            currentTextIndex = (currentTextIndex + 1) % texts.length;
            const glitch = document.querySelector('.glitch');
            glitch.textContent = texts[currentTextIndex];
            glitch.setAttribute('data-text', texts[currentTextIndex]);
        }

        function toggleIntensity() {
            intensity = intensity === 1 ? 2 : 1;
            const style = document.createElement('style');
            style.textContent = `
                .glitch::before {
                    animation-duration: ${0.5 / intensity}s !important;
                }
                .glitch::after {
                    animation-duration: ${0.5 / intensity}s !important;
                }
            `;
            document.head.appendChild(style);
        }

        function randomGlitch() {
            const glitch = document.querySelector('.glitch');
            const randomText = Math.random().toString(36).substring(7).toUpperCase();
            glitch.textContent = randomText;
            glitch.setAttribute('data-text', randomText);
            
            setTimeout(() => {
                glitch.textContent = texts[currentTextIndex];
                glitch.setAttribute('data-text', texts[currentTextIndex]);
            }, 500);
        }

        // Add click effect
        document.querySelector('.glitch').addEventListener('click', function() {
            this.style.animation = 'none';
            setTimeout(() => {
                this.style.animation = '';
            }, 10);
            
            // Create random glitch burst
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    randomGlitch();
                }, i * 100);
            }
        });

        // Add random glitch on interval
        setInterval(() => {
            if (Math.random() > 0.7) {
                randomGlitch();
            }
        }, 3000);
    </script>
</body>
</html>
