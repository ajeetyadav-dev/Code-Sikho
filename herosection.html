<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section</title>
    <style>
        .hero{
            height:100vh;
            background: url(I\ Phone\ 7\ Wallpaper.jpg) center/cover no-repeat;
            position:relative;
            display:flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .hero::before{
            content:"";
            position: absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0, 0, 0, 0.5);
        }
        .hero-content{
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-content">
            <h1>Welcome To Code Sikho With AJ</h1>
            <p>Learn Web Development Step By Step</p>
        </div>
    </div>
</body>
</html>
