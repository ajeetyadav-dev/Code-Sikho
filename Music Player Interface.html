<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .music-player {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .album-art {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            color: white;
            position: relative;
            overflow: hidden;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .album-art.paused {
            animation-play-state: paused;
        }

        .song-info {
            text-align: center;
            margin-bottom: 30px;
        }

        .song-title {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .artist-name {
            font-size: 16px;
            color: #666;
        }

        .progress-container {
            margin-bottom: 30px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 12px;
            color: #999;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border: none;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .control-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .play-btn {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 28px;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .volume-slider {
            flex: 1;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .volume-level {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            width: 70%;
            transition: width 0.3s ease;
        }

        .playlist {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .playlist-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .playlist-item:hover {
            background: white;
        }

        .playlist-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .playlist-number {
            font-size: 12px;
            color: #999;
            width: 20px;
        }

        .playlist-item.active .playlist-number {
            color: white;
        }

        .playlist-song {
            flex: 1;
            font-size: 14px;
        }

        .playlist-duration {
            font-size: 12px;
            color: #999;
        }

        .playlist-item.active .playlist-duration {
            color: white;
        }

        .equalizer {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 20px;
            margin: 0 auto 20px;
        }

        .bar {
            width: 4px;
            background: linear-gradient(to top, #667eea, #764ba2);
            border-radius: 2px;
            animation: dance 0.5s ease-in-out infinite;
        }

        .bar:nth-child(1) { animation-delay: 0s; }
        .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; }
        .bar:nth-child(4) { animation-delay: 0.3s; }
        .bar:nth-child(5) { animation-delay: 0.4s; }

        @keyframes dance {
            0%, 100% { height: 5px; }
            50% { height: 20px; }
        }

        .equalizer.paused .bar {
            animation-play-state: paused;
        }

        @media (max-width: 480px) {
            .music-player {
                padding: 30px 20px;
            }
            
            .song-title {
                font-size: 20px;
            }
            
            .control-btn {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }
            
            .play-btn {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="music-player">
        <div class="album-art" id="albumArt">
            🎵
        </div>

        <div class="equalizer" id="equalizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="song-info">
            <h2 class="song-title" id="songTitle">Summer Vibes</h2>
            <p class="artist-name" id="artistName">The Beach Boys</p>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <div class="progress" id="progress"></div>
            </div>
            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="totalTime">3:45</span>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn" id="shuffleBtn">🔀</button>
            <button class="control-btn" id="prevBtn">⏮️</button>
            <button class="control-btn play-btn" id="playBtn">▶️</button>
            <button class="control-btn" id="nextBtn">⏭️</button>
            <button class="control-btn" id="repeatBtn">🔁</button>
        </div>

        <div class="volume-container">
            <span>🔊</span>
            <div class="volume-slider" id="volumeSlider">
                <div class="volume-level" id="volumeLevel"></div>
            </div>
            <span id="volumeValue">70%</span>
        </div>

        <div class="playlist">
            <div class="playlist-title">Up Next</div>
            <div class="playlist-item active" data-song="0">
                <span class="playlist-number">1</span>
                <span class="playlist-song">Summer Vibes</span>
                <span class="playlist-duration">3:45</span>
            </div>
            <div class="playlist-item" data-song="1">
                <span class="playlist-number">2</span>
                <span class="playlist-song">Ocean Waves</span>
                <span class="playlist-duration">4:12</span>
            </div>
            <div class="playlist-item" data-song="2">
                <span class="playlist-number">3</span>
                <span class="playlist-song">Sunset Boulevard</span>
                <span class="playlist-duration">3:28</span>
            </div>
            <div class="playlist-item" data-song="3">
                <span class="playlist-number">4</span>
                <span class="playlist-song">Tropical Paradise</span>
                <span class="playlist-duration">5:01</span>
            </div>
        </div>
    </div>

    <script>
        class MusicPlayer {
            constructor() {
                this.songs = [
                    { title: 'Summer Vibes', artist: 'The Beach Boys', duration: 225, icon: '🎵' },
                    { title: 'Ocean Waves', artist: 'Coastal Dreams', duration: 252, icon: '🌊' },
                    { title: 'Sunset Boulevard', artist: 'Golden Hour', duration: 208, icon: '🌅' },
                    { title: 'Tropical Paradise', artist: 'Island Breeze', duration: 301, icon: '🏝️' }
                ];
                
                this.currentSong = 0;
                this.isPlaying = false;
                this.currentTime = 0;
                this.volume = 0.7;
                this.isRepeat = false;
                this.isShuffle = false;
                
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.updateSongInfo();
                this.startTimer();
            }

            setupEventListeners() {
                // Play/Pause button
                document.getElementById('playBtn').addEventListener('click', () => this.togglePlay());
                
                // Control buttons
                document.getElementById('prevBtn').addEventListener('click', () => this.previousSong());
                document.getElementById('nextBtn').addEventListener('click', () => this.nextSong());
                document.getElementById('repeatBtn').addEventListener('click', () => this.toggleRepeat());
                document.getElementById('shuffleBtn').addEventListener('click', () => this.toggleShuffle());
                
                // Progress bar
                document.getElementById('progressBar').addEventListener('click', (e) => this.seek(e));
                
                // Volume control
                document.getElementById('volumeSlider').addEventListener('click', (e) => this.changeVolume(e));
                
                // Playlist items
                document.querySelectorAll('.playlist-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const songIndex = parseInt(item.dataset.song);
                        this.playSong(songIndex);
                    });
                });
            }

            togglePlay() {
                this.isPlaying = !this.isPlaying;
                const playBtn = document.getElementById('playBtn');
                const albumArt = document.getElementById('albumArt');
                const equalizer = document.getElementById('equalizer');
                
                if (this.isPlaying) {
                    playBtn.textContent = '⏸️';
                    albumArt.classList.remove('paused');
                    equalizer.classList.remove('paused');
                } else {
                    playBtn.textContent = '▶️';
                    albumArt.classList.add('paused');
                    equalizer.classList.add('paused');
                }
            }

            previousSong() {
                this.currentSong = (this.currentSong - 1 + this.songs.length) % this.songs.length;
                this.playSong(this.currentSong);
            }

            nextSong() {
                if (this.isShuffle) {
                    this.currentSong = Math.floor(Math.random() * this.songs.length);
                } else {
                    this.currentSong = (this.currentSong + 1) % this.songs.length;
                }
                this.playSong(this.currentSong);
            }

            playSong(index) {
                this.currentSong = index;
                this.currentTime = 0;
                this.updateSongInfo();
                this.updatePlaylist();
                
                if (!this.isPlaying) {
                    this.togglePlay();
                }
            }

            updateSongInfo() {
                const song = this.songs[this.currentSong];
                document.getElementById('songTitle').textContent = song.title;
                document.getElementById('artistName').textContent = song.artist;
                document.getElementById('totalTime').textContent = this.formatTime(song.duration);
                document.getElementById('albumArt').textContent = song.icon;
            }

            updatePlaylist() {
                document.querySelectorAll('.playlist-item').forEach((item, index) => {
                    if (index === this.currentSong) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });
            }

            toggleRepeat() {
                this.isRepeat = !this.isRepeat;
                const repeatBtn = document.getElementById('repeatBtn');
                repeatBtn.style.opacity = this.isRepeat ? '1' : '0.5';
            }

            toggleShuffle() {
                this.isShuffle = !this.isShuffle;
                const shuffleBtn = document.getElementById('shuffleBtn');
                shuffleBtn.style.opacity = this.isShuffle ? '1' : '0.5';
            }

            seek(e) {
                const progressBar = document.getElementById('progressBar');
                const rect = progressBar.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                this.currentTime = percent * this.songs[this.currentSong].duration;
                this.updateProgress();
            }

            changeVolume(e) {
                const volumeSlider = document.getElementById('volumeSlider');
                const rect = volumeSlider.getBoundingClientRect();
                this.volume = (e.clientX - rect.left) / rect.width;
                this.volume = Math.max(0, Math.min(1, this.volume));
                this.updateVolume();
            }

            updateVolume() {
                const volumeLevel = document.getElementById('volumeLevel');
                const volumeValue = document.getElementById('volumeValue');
                
                volumeLevel.style.width = (this.volume * 100) + '%';
                volumeValue.textContent = Math.round(this.volume * 100) + '%';
            }

            startTimer() {
                setInterval(() => {
                    if (this.isPlaying) {
                        this.currentTime += 0.1;
                        
                        if (this.currentTime >= this.songs[this.currentSong].duration) {
                            if (this.isRepeat) {
                                this.currentTime = 0;
                            } else {
                                this.nextSong();
                            }
                        }
                        
                        this.updateProgress();
                    }
                }, 100);
            }

            updateProgress() {
                const progress = document.getElementById('progress');
                const currentTimeEl = document.getElementById('currentTime');
                const song = this.songs[this.currentSong];
                
                const percent = (this.currentTime / song.duration) * 100;
                progress.style.width = percent + '%';
                currentTimeEl.textContent = this.formatTime(this.currentTime);
            }

            formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }
        }

        // Initialize music player
        const player = new MusicPlayer();
    </script>
</body>
</html>
