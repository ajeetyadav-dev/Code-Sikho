<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .upload-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
            padding: 40px;
        }

        .upload-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .upload-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .upload-subtitle {
            color: #666;
            font-size: 14px;
        }

        .drop-zone {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .drop-zone.dragover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .drop-zone-icon {
            font-size: 60px;
            color: #667eea;
            margin-bottom: 20px;
        }

        .drop-zone-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
        }

        .drop-zone-subtext {
            font-size: 14px;
            color: #666;
        }

        .file-input {
            display: none;
        }

        .browse-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .browse-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .file-list {
            margin-top: 40px;
        }

        .file-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .file-list-title {
            font-size: 18px;
            color: #333;
            font-weight: 600;
        }

        .clear-all-btn {
            padding: 8px 16px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .clear-all-btn:hover {
            background: #ff5252;
            transform: translateY(-1px);
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .file-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            margin-right: 15px;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .file-meta {
            display: flex;
            gap: 15px;
            font-size: 12px;
            color: #666;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .file-action-btn {
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 8px;
            background: white;
            color: #666;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .file-action-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .upload-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }

        .stat-card {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05), rgba(118, 75, 162, 0.05));
            border-radius: 10px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .toast.success .toast-icon {
            background: #4ecdc4;
            color: white;
        }

        .toast.error .toast-icon {
            background: #ff6b6b;
            color: white;
        }

        .toast-message {
            flex: 1;
            color: #333;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .upload-container {
                padding: 20px;
            }
            
            .drop-zone {
                padding: 40px 20px;
            }
            
            .file-meta {
                flex-direction: column;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="upload-container">
        <div class="upload-header">
            <h1 class="upload-title">📁 File Upload System</h1>
            <p class="upload-subtitle">Drag and drop your files or click to browse</p>
        </div>

        <div class="drop-zone" id="dropZone">
            <div class="drop-zone-icon">☁️</div>
            <div class="drop-zone-text">Drag & Drop files here</div>
            <div class="drop-zone-subtext">or</div>
            <label for="fileInput" class="browse-btn">Browse Files</label>
            <input type="file" id="fileInput" class="file-input" multiple>
        </div>

        <div class="file-list" id="fileList" style="display: none;">
            <div class="file-list-header">
                <h2 class="file-list-title">Uploaded Files</h2>
                <button class="clear-all-btn" onclick="clearAllFiles()">Clear All</button>
            </div>
            <div id="fileItems"></div>
        </div>

        <div class="upload-stats" id="uploadStats" style="display: none;">
            <div class="stat-card">
                <div class="stat-value" id="totalFiles">0</div>
                <div class="stat-label">Total Files</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalSize">0 MB</div>
                <div class="stat-label">Total Size</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="uploadedFiles">0</div>
                <div class="stat-label">Uploaded</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="uploadProgress">0%</div>
                <div class="stat-label">Progress</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <div class="toast-icon"></div>
        <div class="toast-message"></div>
    </div>

    <script>
        class FileUploadSystem {
            constructor() {
                this.files = [];
                this.uploadedCount = 0;
                this.totalSize = 0;
                this.init();
            }

            init() {
                this.setupDropZone();
                this.setupFileInput();
            }

            setupDropZone() {
                const dropZone = document.getElementById('dropZone');
                
                dropZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    dropZone.classList.add('dragover');
                });

                dropZone.addEventListener('dragleave', () => {
                    dropZone.classList.remove('dragover');
                });

                dropZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    dropZone.classList.remove('dragover');
                    this.handleFiles(e.dataTransfer.files);
                });

                dropZone.addEventListener('click', () => {
                    document.getElementById('fileInput').click();
                });
            }

            setupFileInput() {
                const fileInput = document.getElementById('fileInput');
                fileInput.addEventListener('change', (e) => {
                    this.handleFiles(e.target.files);
                });
            }

            handleFiles(fileList) {
                const newFiles = Array.from(fileList);
                newFiles.forEach(file => {
                    const fileObj = {
                        id: Date.now() + Math.random(),
                        file: file,
                        name: file.name,
                        size: file.size,
                        type: file.type,
                        progress: 0,
                        uploaded: false
                    };
                    this.files.push(fileObj);
                    this.totalSize += file.size;
                });

                this.renderFiles();
                this.updateStats();
                this.simulateUpload();
            }

            renderFiles() {
                const fileItems = document.getElementById('fileItems');
                const fileList = document.getElementById('fileList');
                
                if (this.files.length > 0) {
                    fileList.style.display = 'block';
                    document.getElementById('uploadStats').style.display = 'grid';
                }

                fileItems.innerHTML = this.files.map(file => `
                    <div class="file-item" id="file-${file.id}">
                        <div class="file-icon">${this.getFileIcon(file.type)}</div>
                        <div class="file-info">
                            <div class="file-name">${file.name}</div>
                            <div class="file-meta">
                                <span>${this.formatFileSize(file.size)}</span>
                                <span>${file.type || 'Unknown'}</span>
                                <span id="status-${file.id}">Pending</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" id="progress-${file.id}" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="file-actions">
                            <button class="file-action-btn" onclick="fileUploadSystem.downloadFile('${file.id}')" title="Download">
                                ⬇️
                            </button>
                            <button class="file-action-btn" onclick="fileUploadSystem.removeFile('${file.id}')" title="Remove">
                                ❌
                            </button>
                        </div>
                    </div>
                `).join('');
            }

            simulateUpload() {
                this.files.forEach((file, index) => {
                    if (!file.uploaded) {
                        setTimeout(() => {
                            const interval = setInterval(() => {
                                file.progress += Math.random() * 30;
                                if (file.progress >= 100) {
                                    file.progress = 100;
                                    file.uploaded = true;
                                    this.uploadedCount++;
                                    clearInterval(interval);
                                    this.updateFileStatus(file.id, 'Completed');
                                    this.showToast(`${file.name} uploaded successfully!`, 'success');
                                }
                                this.updateProgress(file.id, file.progress);
                                this.updateStats();
                            }, 500);
                        }, index * 200);
                    }
                });
            }

            updateProgress(fileId, progress) {
                const progressBar = document.getElementById(`progress-${fileId}`);
                if (progressBar) {
                    progressBar.style.width = `${progress}%`;
                }
            }

            updateFileStatus(fileId, status) {
                const statusElement = document.getElementById(`status-${fileId}`);
                if (statusElement) {
                    statusElement.textContent = status;
                    statusElement.style.color = status === 'Completed' ? '#4ecdc4' : '#666';
                }
            }

            removeFile(fileId) {
                const fileIndex = this.files.findIndex(f => f.id == fileId);
                if (fileIndex !== -1) {
                    const file = this.files[fileIndex];
                    this.totalSize -= file.size;
                    if (file.uploaded) {
                        this.uploadedCount--;
                    }
                    this.files.splice(fileIndex, 1);
                    
                    document.getElementById(`file-${fileId}`).remove();
                    
                    if (this.files.length === 0) {
                        document.getElementById('fileList').style.display = 'none';
                        document.getElementById('uploadStats').style.display = 'none';
                    }
                    
                    this.updateStats();
                    this.showToast('File removed', 'success');
                }
            }

            downloadFile(fileId) {
                const file = this.files.find(f => f.id == fileId);
                if (file && file.uploaded) {
                    // Create download link
                    const url = URL.createObjectURL(file.file);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = file.name;
                    a.click();
                    URL.revokeObjectURL(url);
                    
                    this.showToast(`Downloading ${file.name}...`, 'success');
                } else {
                    this.showToast('File not uploaded yet', 'error');
                }
            }

            clearAllFiles() {
                if (confirm('Are you sure you want to remove all files?')) {
                    this.files = [];
                    this.uploadedCount = 0;
                    this.totalSize = 0;
                    document.getElementById('fileList').style.display = 'none';
                    document.getElementById('uploadStats').style.display = 'none';
                    this.showToast('All files cleared', 'success');
                }
            }

            updateStats() {
                document.getElementById('totalFiles').textContent = this.files.length;
                document.getElementById('totalSize').textContent = this.formatFileSize(this.totalSize);
                document.getElementById('uploadedFiles').textContent = this.uploadedCount;
                
                const overallProgress = this.files.length > 0 
                    ? Math.round((this.uploadedCount / this.files.length) * 100)
                    : 0;
                document.getElementById('uploadProgress').textContent = `${overallProgress}%`;
            }

            getFileIcon(type) {
                if (type.startsWith('image/')) return '🖼️';
                if (type.startsWith('video/')) return '🎥';
                if (type.startsWith('audio/')) return '🎵';
                if (type.includes('pdf')) return '📄';
                if (type.includes('zip') || type.includes('rar')) return '📦';
                if (type.includes('word') || type.includes('document')) return '📝';
                if (type.includes('excel') || type.includes('spreadsheet')) return '📊';
                if (type.includes('powerpoint') || type.includes('presentation')) return '📈';
                return '📎';
            }

            formatFileSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }

            showToast(message, type = 'success') {
                const toast = document.getElementById('toast');
                const toastIcon = toast.querySelector('.toast-icon');
                const toastMessage = toast.querySelector('.toast-message');
                
                toast.className = `toast ${type}`;
                toastIcon.textContent = type === 'success' ? '✓' : '✕';
                toastMessage.textContent = message;
                
                toast.classList.add('show');
                
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }
        }

        // Initialize the file upload system
        const fileUploadSystem = new FileUploadSystem();

        // Global functions for button clicks
        function clearAllFiles() {
            fileUploadSystem.clearAllFiles();
        }
    </script>
</body>
</html>
